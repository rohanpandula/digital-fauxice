name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
        include:
          - os: windows-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --upgrade build ".[dev,fast]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest
      - name: Build distributions
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: python -m build
      - name: Test installed wheel
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: |
          python -m venv "$RUNNER_TEMP/wheel-venv"
          "$RUNNER_TEMP/wheel-venv/bin/python" -m pip install "pytest>=9,<10" dist/*.whl
          mkdir -p "$RUNNER_TEMP/wheel-tests"
          cd "$RUNNER_TEMP/wheel-tests"
          "$RUNNER_TEMP/wheel-venv/bin/python" -m pytest "$GITHUB_WORKSPACE/tests" -c /dev/null --rootdir="$RUNNER_TEMP/wheel-tests" -q

  test-without-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: python -m pip install ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest

  hybrid:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: hybrid
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: pip install uv
      - name: Sync
        run: uv sync --extra test --python ${{ matrix.python-version }}
      - name: Lint
        run: uv run ruff check src tests
      - name: Test
        run: uv run pytest

[build-system]
requires = ["setuptools>=80"]
build-backend = "setuptools.build_meta"

[project]
name = "portable-digital-ice"
version = "0.3.1"
description = "Portable CPU, CUDA, and Metal runtime for a validated dual-RGBI scanner profile"
requires-python = ">=3.11"
dependencies = [
    "numpy>=2.4,<3",
]

[project.optional-dependencies]
cuda = [
    "cupy-cuda12x>=13",
    "numba>=0.65,<0.68",
]
fast = [
    "numba>=0.65,<0.68",
]
metal = [
    "pyobjc-framework-Metal>=10.3",
    "numba>=0.65,<0.68",
]
test = [
    "pytest>=9,<10",
]
dev = [
    "pytest>=9,<10",
    "ruff>=0.11",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
portable_digital_ice = ["_source_pyproject.toml"]

[tool.pytest.ini_options]
addopts = "-q"
pythonpath = ["src"]
testpaths = ["tests"]
